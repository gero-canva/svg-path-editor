<div class="title" (click)="toggle()" style="margin-top:0;">
  <span>{{panelTitle}}</span>
  @if (panelInfo) {
    <div class="panel-info">{{panelInfo}}</div>
  }
  <mat-icon>{{opened ? 'expand_more':'expand_less'}}</mat-icon>
</div>
@if (opened) {
  <div @openClose class="panel" >
    <div #contentWrapper style="padding-top:2px;padding-bottom:6px">
      <ng-content></ng-content>
    </div>
  </div>
}
